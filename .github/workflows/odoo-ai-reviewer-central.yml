name: Central Odoo AI Reviewer

on:
  workflow_call:
    inputs:
      odoo_version:
        required: true
        type: string
        description: "Versión de Odoo del proyecto (ej. 15.0, 19.0)"
      target_branch:
        required: true
        type: string
        description: "Rama destino del PR en Odoo.sh"
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      - name: Registro de Auditoría
        run: |
          echo "🚀 Iniciando AI Code Review para Indasoge SpA"
          echo "📦 Versión Odoo: ${{ inputs.odoo_version }}"
          echo "🎯 Rama Destino: ${{ inputs.target_branch }}"

      - name: Checkout del repositorio del cliente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraer Diff del PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar SDK de Gemini
        run: pip install google-genai

      - name: Ejecutar Análisis con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ODOO_VERSION: ${{ inputs.odoo_version }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          python -c "
          import os
          import sys
          import time
          from google import genai
          from google.genai.errors import ServerError

          api_key = os.environ.get('GEMINI_API_KEY')
          odoo_version = os.environ.get('ODOO_VERSION')
          target_branch = os.environ.get('TARGET_BRANCH')
          client = genai.Client(api_key=api_key)

          try:
              with open('pr_diff.txt', 'r') as f:
                  diff_content = f.read()
          except FileNotFoundError:
              sys.exit(0)

          if not diff_content.strip():
              sys.exit(0)

          prompt = f'''
          Eres el Tech Lead Senior de Indasoge SpA.
          Tu misión es revisar este Pull Request dirigido a la rama '{target_branch}' para Odoo {odoo_version}.

          Criterios:
          - Compatibilidad estricta con Odoo {odoo_version} (decoradores, métodos del ORM).
          - XML: IDs duplicados o errores de herencia.
          - Performance: Evitar búsquedas dentro de bucles.
          - Seguridad: Validar 'ir.model.access.csv'.

          Si hay errores, da el código corregido. Si está bien, aprueba brevemente.

          DIFF:
          {diff_content}
          '''

          max_retries = 3
          for attempt in range(max_retries):
              try:
                  response = client.models.generate_content(
                      model='gemini-2.5-pro',
                      contents=prompt
                  )
                  with open('review.txt', 'w') as f:
                      f.write(response.text)
                  break 
              except ServerError:
                  if attempt < max_retries - 1:
                      time.sleep(10 * (attempt + 1))
                  else:
                      with open('review.txt', 'w') as f:
                          f.write('⚠️ *Revisión omitida*: Servidores de Google saturados.')
          "

      - name: Publicar comentario en el PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f review.txt ]; then
            gh pr comment ${{ github.event.pull_request.number }} -F review.txt
          fi
