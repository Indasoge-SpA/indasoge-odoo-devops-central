name: Central Odoo AI Reviewer

on:
  workflow_call:
    inputs:
      odoo_version:
        required: true
        type: string
        description: "Versión de Odoo del proyecto (ej. 15.0, 17.0, 19.0)"
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio del cliente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraer los cambios (Diff) del PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt

      - name: Configurar entorno Python para ejecutar la API
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar SDK de Gemini
        run: pip install google-genai

      - name: Ejecutar Análisis con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ODOO_VERSION: ${{ inputs.odoo_version }}
        run: |
          python -c "
          import os
          import sys
          import time
          from google import genai
          from google.genai.errors import ServerError

          api_key = os.environ.get('GEMINI_API_KEY')
          odoo_version = os.environ.get('ODOO_VERSION')
          client = genai.Client(api_key=api_key)

          try:
              with open('pr_diff.txt', 'r') as f:
                  diff_content = f.read()
          except FileNotFoundError:
              sys.exit(0)

          if not diff_content.strip():
              sys.exit(0)

          prompt = f'''
          Eres el Tech Lead Senior de Indasoge SpA, experto en Odoo (Python, XML, PostgreSQL).
          Tu misión es revisar este Pull Request para un proyecto que corre en Odoo versión {odoo_version}.
          
          Criterios de revisión:
          - Asegúrate de que los métodos, decoradores (como @api.depends o @api.model) y sintaxis del ORM sean estrictamente compatibles con la versión {odoo_version}.
          - XML: Errores de sintaxis, etiquetas mal cerradas o IDs duplicados.
          - Python: Uso ineficiente del ORM (evitar 'search' o 'browse' dentro de bucles).
          - Seguridad: Verificar permisos en 'ir.model.access.csv'.

          Si el código tiene errores, sé muy específico y proporciona el bloque de código corregido para Odoo {odoo_version}.
          Si el código es excelente, aprueba brevemente.

          CÓDIGO A REVISAR:
          {diff_content}
          '''

          # Lógica de reintentos (hasta 3 intentos)
          max_retries = 3
          base_delay = 10 

          for attempt in range(max_retries):
              try:
                  print(f'Intento {attempt + 1} de {max_retries} contactando a Gemini...')
                  response = client.models.generate_content(
                      model='gemini-2.5-flash',
                      contents=prompt
                  )
                  
                  # Si tiene éxito, guardamos y salimos del bucle
                  with open('review.txt', 'w') as f:
                      f.write(response.text)
                  print('Revisión completada con éxito.')
                  break
                  
              except ServerError as e:
                  if attempt < max_retries - 1:
                      # Espera progresiva: 10s, luego 20s
                      sleep_time = base_delay * (attempt + 1)
                      print(f'Servidores saturados (503). Reintentando en {sleep_time} segundos...')
                      time.sleep(sleep_time)
                  else:
                      print('Error: Servidores de Gemini no disponibles tras varios intentos.')
                      # Creamos un archivo con un mensaje amigable para no fallar silenciosamente
                      with open('review.txt', 'w') as f:
                          f.write('⚠️ *Revisión automática omitida*: Los servidores de Google Gemini están experimentando alta demanda momentánea. Por favor, revisen el código manualmente o re-ejecuten la Action en unos minutos.')
              except Exception as e:
                   print(f'Error inesperado: {e}')
                   sys.exit(1)
          "
          
      - name: Publicar comentario en el PR del cliente
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f review.txt ]; then
            gh pr comment ${{ github.event.pull_request.number }} -F review.txt
          fi