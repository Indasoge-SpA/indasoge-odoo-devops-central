name: Central Odoo AI Reviewer

on:
  workflow_call:
    # 1. Agregamos un input para que el cliente declare su versión
    inputs:
      odoo_version:
        required: true
        type: string
        description: "Versión de Odoo del proyecto (ej. 15.0, 17.0, 19.0)"
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio del cliente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraer los cambios (Diff) del PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt

      - name: Configurar entorno Python para ejecutar la API
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar SDK de Gemini
        run: pip install google-generativeai

      - name: Ejecutar Análisis con Gemini Pro
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 2. Pasamos el input de GitHub a nuestro script de Python
          ODOO_VERSION: ${{ inputs.odoo_version }}
        run: |
          python -c "
          import google.generativeai as genai
          import os
          import sys

          api_key = os.environ.get('GEMINI_API_KEY')
          odoo_version = os.environ.get('ODOO_VERSION')
          genai.configure(api_key=api_key)
          model = genai.GenerativeModel('gemini-1.5-pro')

          try:
              with open('pr_diff.txt', 'r') as f:
                  diff_content = f.read()
          except FileNotFoundError:
              sys.exit(0)

          if not diff_content.strip():
              sys.exit(0)

          # 3. Le decimos a la IA la versión exacta
          prompt = f'''
          Eres el Tech Lead Senior de Indasoge SpA, experto en Odoo (Python, XML, PostgreSQL).
          Tu misión es revisar este Pull Request para un proyecto que corre en **Odoo versión {odoo_version}**.
          
          Criterios de revisión:
          - Asegúrate de que los métodos, decoradores (como @api.depends o @api.model) y sintaxis del ORM sean estrictamente compatibles con la versión {odoo_version}.
          - XML: Errores de sintaxis, etiquetas mal cerradas o IDs duplicados.
          - Python: Uso ineficiente del ORM (evitar 'search' o 'browse' dentro de bucles).
          - Seguridad: Verificar permisos en 'ir.model.access.csv'.

          Si el código tiene errores, sé muy específico y proporciona el bloque de código corregido para Odoo {odoo_version}.
          Si el código es excelente, aprueba brevemente.

          CÓDIGO A REVISAR:
          {diff_content}
          '''

          response = model.generate_content(prompt)
          with open('review.txt', 'w') as f:
              f.write(response.text)
          "
          
      - name: Publicar comentario en el PR del cliente
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f review.txt ]; then
            gh pr comment ${{ github.event.pull_request.number }} -F review.txt
          fi